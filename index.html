<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>I Love You Heart</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<audio id="music" preload="auto">
  <source src="Massive Attack - Angel.mp3" type="audio/mpeg" />
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const music = document.getElementById("music");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let offset = 0;

// iniciar música
document.body.addEventListener("touchstart", startMusic, {once:true});
document.body.addEventListener("click", startMusic, {once:true});

function startMusic() {
  music.currentTime = 105;
  music.play();
}

// loop música
music.addEventListener("timeupdate", () => {
  if (music.currentTime >= 115) {
    music.currentTime = 105;
  }
});

function heart(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return {x, y};
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "red";
  ctx.font = "16px monospace";
  ctx.shadowColor = "red";
  ctx.shadowBlur = 20;

  // centro vertical
  const centerY = canvas.height / 2;

  // centro horizontal inicial
  const centerX = canvas.width / 2;

  // escala para ocupar metade da tela
  const scale = Math.min(canvas.width, canvas.height) / 35;

  const totalPhrases = 185;
  const step = 0.20;

  for (let i = 0; i < totalPhrases; i++) {
    const t = i * step + offset;
    const p = heart(t);

    // deslocar para a esquerda metade da tela
    const x = centerX/2 + p.x * scale;
    const y = centerY - p.y * scale;

    ctx.fillText("I love you", x, y);
  }

  offset += 0.003;
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
