<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Heart</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}

canvas{
display:block;
}
</style>

</head>

<body>

<canvas id="c"></canvas>

<audio id="music">
<source src="Massive Attack - Angel.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const music = document.getElementById("music");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

let offset = 0;

// iniciar música no primeiro toque
document.body.addEventListener("touchstart", startMusic, {once:true});
document.body.addEventListener("click", startMusic, {once:true});

function startMusic(){
music.currentTime = 105;
music.play();
}

// loop entre 1:45 e 1:55
music.addEventListener("timeupdate", () => {
if(music.currentTime >= 115){
music.currentTime = 105;
}
});

function heart(t){
let x = 16 * Math.pow(Math.sin(t),3);
let y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
return {x,y};
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="red";
ctx.font="16px monospace";

ctx.shadowColor="red";
ctx.shadowBlur=20;

// posição do coração
let centerX;
let centerY = canvas.height / 2;

// se for celular move para esquerda
if(canvas.width < 600){
centerX = canvas.width * 0.15;
}else{
centerX = canvas.width / 2;
}

// escala responsiva
let scale = Math.min(canvas.width, canvas.height) / 45;

for(let i=0;i<200;i++){

let t = (i*0.2) + offset;

let p = heart(t);

if(Math.abs(p.x) < 2 && Math.abs(p.y) < 2){
continue;
}

let x = centerX + p.x * scale;
let y = centerY - p.y * scale;

ctx.fillText("I love you",x,y);
}

offset += 0.005;

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
